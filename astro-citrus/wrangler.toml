# Cloudflare Pages configuration
# For dashboard deployment (not wrangler CLI)

name = "solarcurrents"
pages_build_output_dir = "dist"

[build.environment]
NODE_VERSION = "20"

[env.production.vars]
ENVIRONMENT = "production"
SONICJS_API_URL = "https://solar-currents-cms.buzzuw2.workers.dev"

[env.preview.vars]
ENVIRONMENT = "preview"
SONICJS_API_URL = "https://solar-currents-cms.buzzuw2.workers.dev"
